    <textarea id="file-source" class="col-md-12">const supabase = require(&#039;./supabase&#039;);

// READ
async function read(table) {
  const { data, error } = await supabase
    .from(table)
    .select(&#039;*&#039;);

  if (error) {
    console.error(&#039;READ ERROR:&#039;, error);
    return [];
  }

  return data;
}

// INSERT
async function insert(table, data) {
  const { data: result, error } = await supabase
    .from(table)
    .insert(data)
    .select();

  if (error) {
    console.error(&#039;INSERT ERROR:&#039;, error);
    return { success: false, error };
  }

  return { success: true, data: result };
}


// UPDATE
async function update(table, id, newData) {
  const { error } = await supabase
    .from(table)
    .update(newData)
    .eq(&#039;id&#039;, id);

  if (error) {
    console.error(&#039;UPDATE ERROR:&#039;, error);
  }
}

// DELETE
async function remove(table, id) {
  const { error } = await supabase
    .from(table)
    .delete()
    .eq(&#039;id&#039;, id);

  if (error) {
    console.error(&#039;DELETE ERROR:&#039;, error);
  }
}

// SEED (optional)
async function seed() {
  const bcrypt = require(&#039;bcryptjs&#039;);

  const users = await read(&#039;users&#039;);

  if (users.length === 0) {
    const { v4: uuidv4 } = require(&#039;uuid&#039;);

await insert(&#039;users&#039;, [
  {
    id: uuidv4(), // ✅ uuid เท่านั้น
    username: &#039;admin&#039;,
    email: &#039;admin@starwish.com&#039;,
    password: bcrypt.hashSync(&#039;admin123&#039;, 10),
    role_id: 1, // ✅ ใช้ role_id
    created_at: new Date().toISOString() // ✅ snake_case
  }
]);

    console.log(&#039;✅ Seed users complete&#039;);
  }
}

seed();

module.exports = { read, insert, update, remove };</textarea>
