name: 4kon Project CI

on:
  push:
    branches: [ "main", "dev" ] # รันเมื่อ push เข้า main หรือ dev
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install # ติดตั้ง library ตาม package.json

      - name: Run Tests with Coverage
        run: npm run test:coverage # รันคำสั่ง test ที่คุณตั้งไว้
        env:
          # ดึงค่าจาก Secrets มาเป็น Environment Variables
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'test-secret' }}

      - name: Upload Coverage Report
        if: always() # ให้ทำงานเสมอแม้ test จะไม่ผ่าน
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/ # พาธที่ Jest สร้าง report ออกมา
